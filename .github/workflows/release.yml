name: Build Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK (armeabi-v7a + arm64-v8a)
        run: ./gradlew assembleRelease
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        continue-on-error: true   # skip signing if secrets not configured

      - name: Rename unsigned APK (fallback when signing not configured)
        if: steps.sign_app.outcome == 'skipped' || steps.sign_app.outcome == 'failure'
        run: |
          cd app/build/outputs/apk/release
          APK=$(ls *.apk | head -1)
          cp "$APK" "tomato-novel-unsigned.apk"

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' config.gradle | grep -oP '"\K[^"]+')
          echo "version_name=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}-$(date +'%Y%m%d%H%M')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Tomato Novel Reader ${{ steps.version.outputs.version_name }}"
          body: |
            Auto-built from commit ${{ github.sha }}

            Supports: **armeabi-v7a** (32-bit ARM) and **arm64-v8a** (64-bit ARM)
          files: |
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
