name: Build Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: |
          echo "DOWNLOADER_URL=${{ secrets.DOWNLOADER_URL }}" >> local.properties
          echo "DOWNLOADER_PASSWORD=${{ secrets.DOWNLOADER_PASSWORD }}" >> local.properties

      - name: Build debug APK
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          command: ./gradlew assembleDebug
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' config.gradle | grep -oP '"\K[^"]+')
          echo "version_name=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}-$(date +'%Y%m%d%H%M')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Tomato Novel Reader ${{ steps.version.outputs.version_name }}"
          body: |
            Auto-built from commit ${{ github.sha }}

            Supports: **armeabi-v7a** (32-bit ARM) and **arm64-v8a** (64-bit ARM)
          files: |
            app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
